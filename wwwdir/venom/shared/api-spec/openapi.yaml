openapi: 3.0.3
info:
  title: Api
  description: VENOM CODES API specification — WHMCS-backed client portal
  version: 0.1.0
servers:
  - url: /
paths:
  /api/healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      operationId: logout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new client account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated client info
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT
      operationId: refreshToken
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
  /api/client/profile:
    get:
      tags: [Client]
      summary: Get client profile
      operationId: getClientProfile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
    put:
      tags: [Client]
      summary: Update client profile
      operationId: updateClientProfile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
  /api/client/contacts:
    get:
      tags: [Client]
      summary: List contacts
      operationId: getClientContacts
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      tags: [Client]
      summary: Add contact
      operationId: addClientContact
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/client/contacts/{contactId}:
    put:
      tags: [Client]
      summary: Update contact
      operationId: updateClientContact
      security: [{ bearerAuth: [] }]
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
    delete:
      tags: [Client]
      summary: Delete contact
      operationId: deleteClientContact
      security: [{ bearerAuth: [] }]
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/client/change-password:
    post:
      tags: [Client]
      summary: Change password
      operationId: changePassword
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/client/email-preferences:
    get:
      tags: [Client]
      summary: Get email preferences
      operationId: getEmailPreferences
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailPreferences"
    put:
      tags: [Client]
      summary: Update email preferences
      operationId: updateEmailPreferences
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailPreferences"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/client/credits:
    get:
      tags: [Client]
      summary: Client credit balance
      operationId: getClientCredits
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/client/dashboard:
    get:
      tags: [Client]
      summary: Dashboard summary
      operationId: getDashboardSummary
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /api/services:
    get:
      tags: [Services]
      summary: List services
      operationId: getServices
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesListResponse"
  /api/services/{serviceId}:
    get:
      tags: [Services]
      summary: Get service
      operationId: getService
      security: [{ bearerAuth: [] }]
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/invoices:
    get:
      tags: [Billing]
      summary: List invoices
      operationId: getInvoices
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
  /api/invoices/{invoiceId}:
    get:
      tags: [Billing]
      summary: Get invoice
      operationId: getInvoice
      security: [{ bearerAuth: [] }]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/tickets:
    get:
      tags: [Support]
      summary: List tickets
      operationId: getTickets
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: deptid
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
    post:
      tags: [Support]
      summary: Open ticket
      operationId: createTicket
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/tickets/departments:
    get:
      tags: [Support]
      summary: Ticket departments
      operationId: getTicketDepartments
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDepartmentsResponse"
  /api/domains:
    get:
      tags: [Domains]
      summary: List domains
      operationId: getDomains
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/domains/whois:
    get:
      tags: [Domains]
      summary: WHOIS lookup
      operationId: whoisLookup
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/products:
    get:
      tags: [Catalog]
      summary: Product catalog
      operationId: getProducts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCatalogResponse"
  /api/products/{productId}:
    get:
      tags: [Catalog]
      summary: Single product
      operationId: getProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/cart:
    get:
      tags: [Cart]
      summary: Get cart
      operationId: getCart
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/announcements:
    get:
      tags: [Public]
      summary: Announcements
      operationId: getAnnouncements
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementListResponse"
  /api/knowledgebase:
    get:
      tags: [Public]
      summary: KB index
      operationId: getKnowledgebaseIndex
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbIndexResponse"
  /api/knowledgebase/search:
    get:
      tags: [Public]
      summary: Search KB
      operationId: searchKnowledgebase
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbSearchResponse"
  /api/tickets/statuses:
    get:
      tags: [Support]
      summary: WHMCS GetSupportStatuses
      operationId: getTicketStatuses
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/tickets/counts:
    get:
      tags: [Support]
      summary: WHMCS GetTicketCounts
      operationId: getTicketCounts
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/products/groups:
    get:
      tags: [Catalog]
      summary: Product groups from GetProducts
      operationId: getProductGroups
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/products/pricing:
    get:
      tags: [Catalog]
      summary: WHMCS GetTLDPricing
      operationId: getTldPricing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/users/permissions-list:
    get:
      tags: [Users]
      summary: WHMCS GetPermissionsList
      operationId: getPermissionsList
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/paymethods/capture:
    post:
      tags: [Billing]
      summary: WHMCS CapturePayment (invoiceid)
      operationId: capturePayment
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceId]
              properties:
                invoiceId:
                  type: string
                cvv:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/billing/cycles:
    get:
      tags: [Billing]
      summary: Standard WHMCS billing cycle names (static)
      operationId: getBillingCycles
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/billing/gateways:
    get:
      tags: [Billing]
      summary: WHMCS GetPaymentMethods (active gateways)
      operationId: getPaymentGateways
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/oauth/token:
    post:
      tags: [Auth]
      summary: WHMCS CreateSsoToken (SSO), not OAuth2 token URL
      operationId: createSsoToken
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                destination:
                  type: string
                serviceId:
                  type: string
                domainId:
                  type: string
                userId:
                  type: string
                ssoRedirectPath:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/invoices/{invoiceId}/pay:
    post:
      tags: [Billing]
      operationId: payInvoice
      security: [{ bearerAuth: [] }]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/quotes:
    get:
      tags: [Billing]
      operationId: getQuotes
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteListResponse"
    post:
      tags: [Billing]
      operationId: createQuote
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/quotes/{quoteId}:
    get:
      tags: [Billing]
      operationId: getQuote
      security: [{ bearerAuth: [] }]
      parameters:
        - name: quoteId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
    put:
      tags: [Billing]
      operationId: updateQuote
      security: [{ bearerAuth: [] }]
      parameters:
        - name: quoteId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
    delete:
      tags: [Billing]
      operationId: deleteQuote
      security: [{ bearerAuth: [] }]
      parameters:
        - name: quoteId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/quotes/{quoteId}/accept:
    post:
      tags: [Billing]
      operationId: acceptQuote
      security: [{ bearerAuth: [] }]
      parameters:
        - name: quoteId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/quotes/{quoteId}/send:
    post:
      tags: [Billing]
      operationId: sendQuote
      security: [{ bearerAuth: [] }]
      parameters:
        - name: quoteId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/orders:
    get:
      tags: [Billing]
      operationId: getOrders
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
  /api/orders/{orderId}:
    get:
      tags: [Billing]
      operationId: getOrder
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/orders/{orderId}/cancel:
    post:
      tags: [Billing]
      operationId: cancelOrder
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/paymethods:
    get:
      tags: [Billing]
      operationId: getPayMethods
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayMethodCard"
    post:
      tags: [Billing]
      operationId: addPayMethod
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPayMethodBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/paymethods/{payMethodId}:
    delete:
      tags: [Billing]
      operationId: deletePayMethod
      security: [{ bearerAuth: [] }]
      parameters:
        - name: payMethodId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddCartItemResponse"
  /api/cart/items/{itemId}:
    delete:
      tags: [Cart]
      operationId: removeCartItem
      security: [{ bearerAuth: [] }]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/cart/clear:
    post:
      tags: [Cart]
      operationId: clearCart
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/cart/checkout:
    post:
      tags: [Cart]
      operationId: checkoutCart
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyJson"
  /api/tickets/{ticketId}:
    get:
      tags: [Support]
      operationId: getTicket
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
  /api/tickets/{ticketId}/reply:
    post:
      tags: [Support]
      operationId: replyToTicket
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReplyBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/tickets/{ticketId}/close:
    post:
      tags: [Support]
      operationId: closeTicket
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/services/{serviceId}/addons:
    get:
      tags: [Services]
      operationId: getServiceAddons
      security: [{ bearerAuth: [] }]
      parameters:
        - name: serviceId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
