# Venom Codes - Development Site (Wildcard SSL)

# Default server block - deny all unknown domains
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# HTTP to HTTPS redirect (catches all *.venom-codes.test)
server {
    listen 80;
    server_name venom-codes.test *.venom-codes.test;
    access_log /home/venom/logs/nginx/venom-codes-access.log;
    error_log /home/venom/logs/nginx/venom-codes-error.log;
    return 301 https://$host$request_uri;
}

# WWW to non-WWW redirect (HTTP)
server {
    listen 80;
    server_name www.venom-codes.test;
    return 301 https://venom-codes.test$request_uri;
}

# WWW to non-WWW redirect (HTTPS)
server {
    listen 443 ssl;
    server_name www.venom-codes.test;

    ssl_certificate /home/venom/nginx/certs/wildcard.venom-codes.test.crt;
    ssl_certificate_key /home/venom/nginx/certs/wildcard.venom-codes.test.key;
    include /home/venom/nginx/conf/ssl.conf;

    return 301 https://venom-codes.test$request_uri;
}

# Default HTTPS server block - deny all unknown domains
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /home/venom/nginx/certs/wildcard.venom-codes.test.crt;
    ssl_certificate_key /home/venom/nginx/certs/wildcard.venom-codes.test.key;
    include /home/venom/nginx/conf/ssl.conf;

    return 444;
}

# api.venom-codes.test — Node API removed; SSL host kept so clients get a clean response
server {
    listen 443 ssl;
    server_name api.venom-codes.test;

    ssl_certificate /home/venom/nginx/certs/wildcard.venom-codes.test.crt;
    ssl_certificate_key /home/venom/nginx/certs/wildcard.venom-codes.test.key;
    include /home/venom/nginx/conf/ssl.conf;

    access_log /home/venom/logs/nginx/api-venom-codes-access.log;
    error_log /home/venom/logs/nginx/api-venom-codes-error.log;

    default_type text/plain;
    return 404 "Not found\n";
}

# Dev-only: Vite + HMR on dev.venom-codes.test (production apex uses static portal — see main block below)
server {
    listen 443 ssl;
    server_name dev.venom-codes.test;

    ssl_certificate /home/venom/nginx/certs/wildcard.venom-codes.test.crt;
    ssl_certificate_key /home/venom/nginx/certs/wildcard.venom-codes.test.key;
    include /home/venom/nginx/conf/ssl.conf;

    access_log /home/venom/logs/nginx/venom-codes-dev-access.log;
    error_log /home/venom/logs/nginx/venom-codes-dev-error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;

        proxy_pass http://127.0.0.1:18130;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# Main HTTPS: WHMCS client area (use dev.venom-codes.test for optional Vite dev)
server {
    listen 443 ssl;
    server_name venom-codes.test;

    ssl_certificate /home/venom/nginx/certs/wildcard.venom-codes.test.crt;
    ssl_certificate_key /home/venom/nginx/certs/wildcard.venom-codes.test.key;

    include /home/venom/nginx/conf/ssl.conf;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/venom/wwwdir/whmcs;
    index index.php index.html;

    access_log /home/venom/logs/nginx/venom-codes-access.log;
    error_log /home/venom/logs/nginx/venom-codes-error.log;

    location ^~ /.well-known {
        allow all;
    }

    # Root dotfiles only — broad /\/\. breaks /node_modules/.vite/ (Vite)
    location ~ ^/\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Protect sensitive files
    location ~ /(\.env|composer\.(json|lock)|package\.(json|lock)|artisan) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================
    # API Proxy — Node.js Backend (Production)
    # ============================
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================
    # Portal — React SPA Static Files (Production)
    # ============================
    location /portal/ {
        alias /home/venom/wwwdir/venom/frontend/dist/;
        try_files $uri $uri/ /portal/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache HTML
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }

    # ============================
    # WHMCS client area (standard front controller)
    # ============================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================
    # WHMCS Admin Area
    # ============================
    location /admin {
        try_files $uri $uri/ /admin.php?$query_string;
    }

    # ============================
    # WHMCS OAuth2 OpenID Connect endpoints
    # ============================
    location = /oauth/openid-configuration {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root/oauth/openid-configuration.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    location = /oauth/authorize {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root/oauth/authorize.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    location = /oauth/token {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root/oauth/token.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    location = /oauth/certs {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root/oauth/certs.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    location = /oauth/userinfo {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root/oauth/userinfo.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    location = /oauth/index {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root/oauth/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    location /oauth {
        try_files $uri $uri/ /oauth/index.php?$query_string;
    }

    # ============================
    # WHMCS Original Routes
    # ============================
    location /whmcs-original {
        alias /home/venom/wwwdir/whmcs;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================
    # WHMCS includes/api.php
    # ============================
    location /includes/api.php {
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_pass php_shared;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    # ============================
    # PHP processing (for WHMCS)
    # ============================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php_shared;
        fastcgi_index index.php;
        include /home/venom/nginx/conf/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
        fastcgi_param HTTP_PROXY "";
    }

    # ============================
    # phpMyAdmin
    # ============================
    location /phpmyadmin {
        alias /home/venom/wwwdir/phpmyadmin;
        index index.php;

        location ~ ^/phpmyadmin/(.+\.php)$ {
            alias /home/venom/wwwdir/phpmyadmin/$1;
            fastcgi_pass php_shared;
            fastcgi_index index.php;
            include /home/venom/nginx/conf/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param DOCUMENT_ROOT /home/venom/wwwdir/phpmyadmin;
        }

        location ~* ^/phpmyadmin/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt))$ {
            alias /home/venom/wwwdir/phpmyadmin/$1;
        }
    }

    # WHMCS favicon
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires 7d;
    }
}
