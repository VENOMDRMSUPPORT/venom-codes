# /etc/logrotate.d/venom
# Log rotation configuration for Venom Framework

/home/venom/logs/**/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 venom venom
    sharedscripts
    postrotate
        kill -HUP $(cat /home/venom/data/runtime/pid/nginx.pid 2>/dev/null) 2>/dev/null || true
    endscript
}

/home/venom/logs/php-fpm/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 venom venom
}

/home/venom/logs/php-fpm/*slow.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 venom venom
}

/home/venom/logs/system/venom.log {
    daily
    missingok
    rotate 90
    compress
    delaycompress
    notifempty
    create 0640 venom venom
    dateext
    dateformat -%Y-%m-%d
}
