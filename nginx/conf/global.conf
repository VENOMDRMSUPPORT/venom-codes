# MIME Types & Defaults
include /home/venom/nginx/conf/mime.types;
default_type application/octet-stream;

# Logging Format - All in single cache directory
client_body_temp_path /home/venom/data/cache;
proxy_temp_path       /home/venom/data/cache;
fastcgi_temp_path     /home/venom/data/cache;
uwsgi_temp_path       /home/venom/data/cache;
scgi_temp_path        /home/venom/data/cache;

log_format main '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_referer" "$http_user_agent" '
                'rt=$request_time uct="$upstream_connect_time"';

log_format timing '$remote_addr [$time_local] "$request" '
                  '$status rt=$request_time '
                  'uct="$upstream_connect_time" '
                  'urt="$upstream_response_time"';

access_log /home/venom/logs/nginx/default_access.log main;
error_log /home/venom/logs/nginx/default_error.log warn;

# Performance Settings
sendfile on;
tcp_nopush on;
tcp_nodelay on;
reset_timedout_connection on;

# Compression (off for streaming performance)
gzip off;

# Timeouts
keepalive_timeout 15;
send_timeout 20m;
client_body_timeout 13s;
client_header_timeout 13s;

# Buffers
client_max_body_size 5m;
client_body_buffer_size 128k;
sendfile_max_chunk 512k;

# FastCGI Settings
fastcgi_read_timeout 300;
fastcgi_send_timeout 300;

# Async I/O
lingering_close off;
aio threads=venom_pool;

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=general:50m rate=25r/s;
limit_req_zone $binary_remote_addr zone=streaming:100m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api:50m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:50m;

# WebSocket mapping (for code-server)
include websocket.conf;
